name: Refresh Dashboard

on:
  schedule:
    # Run every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install flights curl_cffi

      - name: Patch fli library for currency + aircraft
        run: |
          SITE=$(python -c "import fli; import os; print(os.path.dirname(fli.__file__))")

          # Patch SearchFlights for currency/country params
          python -c "
          import re
          path = '${SITE}/search/flights.py'
          with open(path) as f: src = f.read()
          if 'currency' not in src:
              src = src.replace(
                  'class SearchFlights(BaseSearch):',
                  '''class SearchFlights(BaseSearch):
      def __init__(self, currency=\"USD\", country=\"us\", language=\"en\"):
          super().__init__()
          self.currency = currency
          self.country = country
          self.language = language
  ''')
              src = src.replace(
                  'self.BASE_URL',
                  'f\"{self.BASE_URL}?hl={self.language}&gl={self.country}&curr={self.currency}\"',
                  1
              )
              # Add aircraft extraction
              src = src.replace(
                  'duration=fl[11],',
                  'duration=fl[11],\\n                    aircraft=fl[17] if len(fl) > 17 and isinstance(fl[17], str) else None,'
              )
              with open(path, 'w') as f: f.write(src)
              print('Patched flights.py')

          # Patch FlightLeg model
          path2 = '${SITE}/models/google_flights/base.py'
          with open(path2) as f: src2 = f.read()
          if 'aircraft' not in src2:
              src2 = src2.replace(
                  'duration: PositiveInt  # in minutes',
                  'duration: PositiveInt  # in minutes\\n    aircraft: str | None = None'
              )
              with open(path2, 'w') as f: f.write(src2)
              print('Patched base.py')
          "

      - name: Generate dashboard
        run: python cx_monitor.py
        timeout-minutes: 10

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cx_dashboard.html
          git diff --cached --quiet || git commit -m "Refresh dashboard data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
