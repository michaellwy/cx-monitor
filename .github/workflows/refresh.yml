name: Refresh Dashboard

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install flights curl_cffi

      - name: Patch fli library
        run: python patch_fli.py

      - name: Generate dashboard
        run: python cx_monitor.py
        timeout-minutes: 10

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cx_dashboard.html
          git diff --cached --quiet || git commit -m "Refresh dashboard data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
